services:

  # ── llama.cpp server — local model runtime ───────────────────
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: gemmaschool-llama
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    command:
      - --models-dir
      - /models
      - --models-max
      - "1"
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -np
      - "1"
      - -c
      - "${LLAMA_CTX_SIZE:-12288}"
      - -b
      - "${LLAMA_BATCH_SIZE:-1024}"
      - -ngl
      - "0"
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gemmaschool-backend
    volumes:
      - ./vault:/vault
      - .:/project
      - /var/run/docker.sock:/var/run/docker.sock  # allows backend to restart llama-server on model switch
    ports:
      - "8000:8000"
    environment:
      - LLAMA_BASE_URL=http://llama-server:8080
      - LLAMA_MODEL=${LLAMA_MODEL:-gemma4:e2b}
      - LLAMA_MODEL_FILE=${LLAMA_MODEL_FILE:-gemma-4-E2B-it-Q4_K_M.gguf}
      - VAULT_PATH=/vault
      - FASTSD_URL=http://fastsd:7860
      - HOST_RAM_GB=${HOST_RAM_GB:-}
      - HOST_AVAILABLE_GB=${HOST_AVAILABLE_GB:-}
      - HOST_CPU_CORES=${HOST_CPU_CORES:-}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-gemmaschool}
    depends_on:
      - llama-server
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: gemmaschool-frontend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── FastSD — local image generation ──────────────────────────
  fastsd:
    image: rupeshs/fastsdcpu:latest
    container_name: gemmaschool-fastsd
    profiles: [full]
    volumes:
      - ./vault/Assets:/app/results
    ports:
      - "7860:7860"
    restart: unless-stopped

volumes: {}
