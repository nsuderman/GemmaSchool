services:

  # ── Ollama — model runtime (replaces llama-server) ───────────
  # Starts with the base stack. Setup wizard pulls models on first run.
  # Ollama is built on llama.cpp internally.
  ollama:
    image: ollama/ollama
    container_name: gemmaschool-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gemmaschool-backend
    volumes:
      - ./vault:/vault
      - .:/project
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VAULT_PATH=/vault
      - FASTSD_URL=http://fastsd:7860
      - HOST_RAM_GB=${HOST_RAM_GB:-}
      - HOST_CPU_CORES=${HOST_CPU_CORES:-}
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: gemmaschool-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── FastSD — local image generation ──────────────────────────
  fastsd:
    image: rupeshs/fastsdcpu:latest
    container_name: gemmaschool-fastsd
    profiles: [full]
    volumes:
      - ./vault/Assets:/app/results
    ports:
      - "7860:7860"
    restart: unless-stopped

volumes:
  ollama_data:   # persists pulled models across container restarts
